<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PastVu GeoGuessr</title>

  <link
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      padding: 12px 20px;
      background: #1b1b1b;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game {
      display: grid;
      grid-template-columns: 1fr 420px;
      flex: 1;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      border-left: 1px solid #333;
      background: #181818;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .image-container {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    .photo {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 8px;
      background: #222;
    }

    .info {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    .controls {
      padding: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #2d7ff9;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1f6be0;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .results {
      padding: 12px;
      overflow-y: auto;
      flex: 1;
    }

    .score {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .distance {
      margin-bottom: 10px;
    }

    .meta {
      color: #bbb;
      line-height: 1.5;
    }

    .status {
      padding: 12px;
      color: #aaa;
    }

    .marker-label {
      background: white;
      color: black;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .game {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: 50vh;
      }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <div>
      <strong>PastVu GeoGuessr</strong>
    </div>

    <div>
      Score:
      <span id="totalScore">0</span>
    </div>
  </div>

  <div class="game">

    <div id="map"></div>

    <div class="sidebar">

      <div class="image-container">
        <img id="photo" class="photo" />
      </div>

      <div class="info">
        <div>
          Guess where this historical photo was taken.
        </div>

        <div class="status" id="status">
          Click the map to place your guess.
        </div>
      </div>

      <div class="controls">
        <button id="submitBtn" disabled>
          Submit Guess
        </button>

        <button id="nextBtn" disabled>
          Next Round
        </button>
      </div>

      <div class="results" id="results"></div>

    </div>
  </div>

</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
 
  const CITY_BOUNDS = [
    {
      name: "London",
      polygon: [[
        [-0.55, 51.28],
        [0.30, 51.28],
        [0.30, 51.70],
        [-0.55, 51.70],
        [-0.55, 51.28]
      ]]
    },
    {
      name: "Paris",
      polygon: [[
        [2.15, 48.78],
        [2.48, 48.78],
        [2.48, 48.95],
        [2.15, 48.95],
        [2.15, 48.78]
      ]]
    },
    {
      name: "New York",
      polygon: [[
        [-74.10, 40.60],
        [-73.70, 40.60],
        [-73.70, 40.95],
        [-74.10, 40.95],
        [-74.10, 40.60]
      ]]
    }
  ];

  let map;
  let currentPhoto = null;
  let currentGuess = null;
  let guessMarker = null;
  let actualMarker = null;
  let lineId = "result-line";
  let totalScore = 0;

  const submitBtn = document.getElementById("submitBtn");
  const nextBtn = document.getElementById("nextBtn");
  const photoEl = document.getElementById("photo");
  const resultsEl = document.getElementById("results");
  const statusEl = document.getElementById("status");
  const totalScoreEl = document.getElementById("totalScore");



init();



async function init() {

  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [0, 20],
    zoom: 2
  });

  map.addControl(
    new maplibregl.NavigationControl()
  );

  map.on("click", onMapClick);

  await loadRound();
}



  async function loadRound() {
    resetRound();

    statusEl.innerText = "Loading historical photo...";

    try {
      const city =
        CITY_BOUNDS[Math.floor(Math.random() * CITY_BOUNDS.length)];

      const geometry = {
        type: "Polygon",
        coordinates: city.polygon
      };

      const params = encodeURIComponent(JSON.stringify({
        z: 14,
        geometry,
        localWork: 1
      }));

      const url =
        `https://api.pastvu.com/api2?method=photo.getByBounds&params=${params}`;

      const response = await fetch(url);
      const data = await response.json();

      const photos = data.result.photos.filter(p =>
        p.geo &&
        p.file &&
        p.year
      );

      if (!photos.length) {
        throw new Error("No photos found");
      }

      const random =
        photos[Math.floor(Math.random() * photos.length)];

      currentPhoto = random;

      photoEl.src =
        `https://img.pastvu.com/d/${random.file}`;

      statusEl.innerText =
        "Click anywhere on the map to place your guess.";

    } catch (err) {
      console.error(err);

      statusEl.innerText =
        "Failed to load photo. Refresh to try again.";
    }
  }

  function onMapClick(e) {
    if (!currentPhoto) return;

    currentGuess = {
      lat: e.lngLat.lat,
      lng: e.lngLat.lng
    };

    submitBtn.disabled = false;

    if (guessMarker) {
      guessMarker.remove();
    }

    guessMarker = new maplibregl.Marker({
      color: "#3b82f6"
    })
      .setLngLat([currentGuess.lng, currentGuess.lat])
      .addTo(map);

    statusEl.innerText =
      "Press Submit Guess when ready.";
  }

  submitBtn.addEventListener("click", submitGuess);

  function submitGuess() {
    if (!currentGuess || !currentPhoto) return;

    submitBtn.disabled = true;
    nextBtn.disabled = false;

    const actualLat = currentPhoto.geo[0];
    const actualLng = currentPhoto.geo[1];

    const distance = haversine(
      currentGuess.lat,
      currentGuess.lng,
      actualLat,
      actualLng
    );

    const score = calculateScore(distance);

    totalScore += score;
    totalScoreEl.innerText = totalScore;

    actualMarker = new maplibregl.Marker({
      color: "#ef4444"
    })
      .setLngLat([actualLng, actualLat])
      .addTo(map);

    drawLine(
      [currentGuess.lng, currentGuess.lat],
      [actualLng, actualLat]
    );

    fitMapToResults(
      [currentGuess.lng, currentGuess.lat],
      [actualLng, actualLat]
    );

    resultsEl.innerHTML = `
      <div class="score">
        ${score} points
      </div>

      <div class="distance">
        Distance: ${distance.toFixed(1)} km
      </div>

      <div class="meta">
        <div>
          <strong>${escapeHtml(currentPhoto.title || "Untitled")}</strong>
        </div>

        <div>
          Year: ${currentPhoto.year}
        </div>

        <div>
          Actual Coordinates:
          ${actualLat.toFixed(5)},
          ${actualLng.toFixed(5)}
        </div>

        <div style="margin-top:10px;">
          Photo ID: ${currentPhoto.cid}
        </div>
      </div>
    `;

    statusEl.innerText =
      "Round complete. Press Next Round.";
  }

  nextBtn.addEventListener("click", loadRound);

  function resetRound() {
    currentGuess = null;

    submitBtn.disabled = true;
    nextBtn.disabled = true;

    resultsEl.innerHTML = "";

    if (guessMarker) {
      guessMarker.remove();
      guessMarker = null;
    }

    if (actualMarker) {
      actualMarker.remove();
      actualMarker = null;
    }

    if (map.getLayer(lineId)) {
      map.removeLayer(lineId);
    }

    if (map.getSource(lineId)) {
      map.removeSource(lineId);
    }

    map.flyTo({
      center: [0, 20],
      zoom: 2
    });
  }

  function drawLine(start, end) {
    if (map.getLayer(lineId)) {
      map.removeLayer(lineId);
    }

    if (map.getSource(lineId)) {
      map.removeSource(lineId);
    }

    map.addSource(lineId, {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: [start, end]
        }
      }
    });

    map.addLayer({
      id: lineId,
      type: "line",
      source: lineId,
      paint: {
        "line-color": "#ffffff",
        "line-width": 3
      }
    });
  }

  function fitMapToResults(a, b) {
    const bounds = new maplibregl.LngLatBounds();

    bounds.extend(a);
    bounds.extend(b);

    map.fitBounds(bounds, {
      padding: 80
    });
  }

  function calculateScore(distanceKm) {
    return Math.round(
      5000 * Math.exp(-distanceKm / 2000)
    );
  }

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) *
      Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) *
      Math.sin(dLon / 2);

    const c =
      2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c;
  }

  function toRad(v) {
    return v * Math.PI / 180;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
</script>

</body>
</html>
